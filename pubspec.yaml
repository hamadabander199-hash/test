name: camzone_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.5.0
  permission_handler: ^12.0.1
  firebase_auth: ^6.2.0
  provider: ^6.1.5+1
  camera: ^0.12.0
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  firebase_storage: ^13.1.0
  firebase_app_check: ^0.4.1+5
  intl: ^0.20.2
  fluttertoast: ^9.0.0
  flutter_launcher_icons: ^0.14.4
  cupertino_native: ^0.1.1
  flutter_secure_storage: ^10.3.1
  file_picker: ^11.0.2
  sqflite_sqlcipher: ^3.4.0
  photo_view: ^0.15.0
  video_player: ^2.13.0
  local_auth: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"


flutter:
  uses-material-design: true
  assets:
    - assets/public.pem